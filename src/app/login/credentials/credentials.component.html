@if (oauthOptions.initRequest && oauthOptions.visibleOnLoginPage) {
  <div class="m-b-40" id="oauth">
    <button
      class="btn btn-default btn-block btn-lg form-group m-t-8"
      title="{{ oauthOptions.buttonName | translate }}"
      type="button"
      (click)="redirectToOauth()"
    >
      <i class="pull-left" [c8yIcon]="'sign-in'"></i>
      {{ oauthOptions.buttonName | translate }}
    </button>
  </div>
}

@if (showLoginForm) {
  <form class="loginForm" (ngSubmit)="login()" #loginForm="ngForm" novalidate>
    @if (!(oauthOptions.initRequest && oauthOptions.visibleOnLoginPage)) {
      <span class="legend form-block center" translate> Login </span>
    } @else {
      <div class="legend form-block center" translate>
        or enter your credentials`prefixed by login button`
      </div>
    }
    @if (showTenant) {
      <c8y-form-group class="tenantField m-b-40" id="tenantField">
        <label for="tenant" translate> Tenant ID </label>
        <input
          class="form-control"
          id="tenant"
          placeholder="{{ 'e.g.' | translate }} t12345"
          name="tenant"
          type="text"
          required
          [(ngModel)]="model.tenant"
          #tenant="ngModel"
          autocapitalize="off"
          autocorrect="off"
          placeholder-no-required-hint
          [readonly]="loginViewParams.disableTenant"
        />
      </c8y-form-group>
    }
    <c8y-form-group class="m-b-40">
      <label for="user" translate> Username </label>
      <input
        class="form-control"
        id="user"
        placeholder="{{ 'e.g. joe or joe.doe@example.com`LOCALIZE`' | translate }}"
        name="user"
        type="text"
        required
        [(ngModel)]="model.user"
        #user="ngModel"
        autocapitalize="off"
        autocorrect="off"
        placeholder-no-required-hint
      />
    </c8y-form-group>
    <c8y-form-group class="m-b-40">
      <label for="password" translate> Password </label>
      <c8y-password-input
        name="password"
        required
        [id]="'password'"
        [(ngModel)]="model.password"
        [autocomplete]="'off'"
      ></c8y-password-input>
    </c8y-form-group>
    @if (showBasicAuth) {
      <div class="form-group">
        <label class="c8y-checkbox" title="{{ 'Remember me' | translate }}">
          <input name="remember" type="checkbox" [(ngModel)]="loginService.rememberMe" />
          <span></span>
          <span>{{ 'Remember me' | translate }}</span>
        </label>
      </div>
    }
    <button
      class="btn btn-primary btn-lg btn-block form-group"
      title="{{ 'Log in' | translate }}"
      type="submit"
      [disabled]="!loginForm.form.valid || isLoading"
    >
      {{ 'Log in' | translate }}
    </button>
    <div class="text-center m-t-8">
      <button
        class="btn btn-link btn-sm"
        title="{{ 'Forgot password?' | translate }}"
        type="button"
        (click)="onChangeView.emit({ view: LOGIN_VIEWS.RecoverPassword })"
      >
        {{ 'Forgot password?' | translate }}
      </button>
    </div>
  </form>
}
